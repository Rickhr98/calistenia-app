<!-- Tracker de calistenia: plan + equipo + rutina rapida + guias + progreso persistente -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Sala de Skills</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#EBEEF3; --surface:#FFFFFF; --surface-2:#F3F5F9;
    --ink:#141A24; --muted:#6A7486; --line:#DDE2EA;
    --accent:#4338CA; --accent-soft:#EAE8FD;
    --lime:#B6E82E; --amber:#F0A32B; --ok:#18A957;
    --disp:'Space Grotesk',system-ui,sans-serif;
    --body:'Inter',system-ui,sans-serif;
    --mono:'Space Mono',ui-monospace,monospace;
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:15px;line-height:1.5;
    padding:0 0 90px;max-width:560px;margin:0 auto;min-height:100vh}
  h1,h2,h3,.disp{font-family:var(--disp)}
  .mono{font-family:var(--mono)}
  a{color:inherit}

  header{padding:22px 18px 10px;position:sticky;top:0;background:linear-gradient(var(--bg) 80%,transparent);z-index:5}
  .kicker{font:600 11px/1 var(--mono);letter-spacing:.22em;text-transform:uppercase;color:var(--accent)}
  header h1{font-size:27px;font-weight:700;letter-spacing:-.02em;margin-top:6px}

  .equip-bar{display:flex;align-items:center;gap:8px;margin-top:12px}
  .equip-btn{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--line);
    border-radius:999px;padding:8px 13px 8px 11px;cursor:pointer;font:600 13px var(--body);color:var(--ink);flex:1;min-width:0}
  .equip-btn .dot{width:8px;height:8px;border-radius:50%;background:var(--lime);flex:0 0 auto}
  .equip-btn .lbl{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .equip-btn .chev{margin-left:auto;color:var(--muted);flex:0 0 auto}
  .quick-toggle{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);border-radius:999px;
    padding:8px 14px;font:700 13px var(--body);color:var(--muted);cursor:pointer;transition:.12s;white-space:nowrap}
  .quick-toggle.on{background:var(--lime);border-color:var(--lime);color:#2c3a00}

  nav{display:flex;gap:6px;padding:10px 18px 12px;overflow-x:auto;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;border:1px solid var(--line);background:var(--surface);color:var(--muted);
    font:600 13px var(--body);padding:9px 15px;border-radius:999px;cursor:pointer;white-space:nowrap;transition:.15s}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  main{padding:0 14px}
  .day-head{display:flex;align-items:baseline;justify-content:space-between;padding:6px 4px 10px}
  .day-head .n{font:700 13px var(--mono);color:var(--accent)}
  .day-head .focus{font-family:var(--disp);font-size:19px;font-weight:600;text-align:right}
  .quick-banner{display:flex;align-items:center;gap:8px;background:#f4fbe0;border:1px solid #d8ec9f;color:#4d7a00;
    border-radius:12px;padding:9px 13px;font-size:12.5px;font-weight:600;margin:0 4px 12px}

  .note{background:var(--accent-soft);border-radius:12px;padding:11px 13px;font-size:12.5px;color:#37308f;margin:0 4px 14px;display:flex;gap:8px;align-items:flex-start}

  .ex{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:14px;margin-bottom:10px}
  .ex.adapted{border-color:#cfe6a8;background:linear-gradient(0deg,#fbfef4,#fff)}
  .ex-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
  .ex-name{font-family:var(--disp);font-weight:600;font-size:15.5px;line-height:1.25}
  .ex-target{color:var(--muted);font-size:12.5px;margin-top:3px}
  .swap{font:600 11px var(--body);color:#4d7a00;margin-top:5px;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
  .swap s{color:var(--muted);font-weight:400;text-decoration:line-through}
  .badge{flex:0 0 auto;font:700 10px/1 var(--mono);letter-spacing:.05em;text-transform:uppercase;padding:5px 8px;border-radius:7px;background:var(--surface-2);color:var(--muted)}
  .badge.hold{background:var(--accent-soft);color:var(--accent)}
  .badge.skill{background:#eafad0;color:#4d7a00}

  .ex-actions{display:flex;gap:8px;margin-top:12px;align-items:center}
  .btn{font:600 13px var(--body);border:1px solid var(--line);background:var(--surface);color:var(--ink);padding:9px 13px;border-radius:10px;cursor:pointer;transition:.12s}
  .btn:active{transform:scale(.97)}
  .btn.p{background:var(--accent);color:#fff;border-color:var(--accent)}
  .btn.t{background:var(--ink);color:#fff;border-color:var(--ink);display:flex;align-items:center;gap:6px}
  .btn.howto{padding:9px 11px;color:var(--muted);display:flex;align-items:center;gap:5px}
  .last{margin-left:auto;font:700 12px var(--mono);color:var(--ok);text-align:right}
  .last span{display:block;font-weight:400;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.08em}
  .last.empty{color:var(--muted)}

  .hidden-note{text-align:center;font-size:12px;color:var(--muted);padding:6px 4px 2px}
  .empty-day{background:var(--surface);border:1px dashed var(--line);border-radius:var(--r);padding:24px 18px;text-align:center;color:var(--muted);font-size:13.5px}
  .empty-day b{color:var(--ink);display:block;margin-bottom:4px;font-family:var(--disp)}

  .mob{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:6px 4px}
  .mob-row{display:flex;gap:12px;padding:12px 12px;border-bottom:1px solid var(--line);align-items:center}
  .mob-row:last-child{border-bottom:0}
  .mob-row .t{font-family:var(--mono);font-weight:700;font-size:13px;color:var(--accent);flex:0 0 46px}
  .mob-row .d{font-size:13.5px}
  .mob-row .d small{display:block;color:var(--muted);font-size:12px}

  .prog-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px;margin-bottom:12px}
  .prog-card h3{font-size:16px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline}
  .pr{font:700 22px var(--mono);color:var(--ink)}
  .pr small{font-size:12px;color:var(--muted);font-weight:400}
  .track{height:9px;background:var(--surface-2);border-radius:99px;margin:12px 0 8px;overflow:hidden}
  .fill{height:100%;background:linear-gradient(90deg,var(--accent),#6d5ef0);border-radius:99px;transition:width .5s}
  .fill.gold{background:linear-gradient(90deg,var(--amber),var(--lime))}
  .milestones{display:flex;justify-content:space-between;font-size:10.5px;color:var(--muted);font-family:var(--mono)}
  .spark{display:flex;gap:3px;align-items:flex-end;height:34px;margin-top:12px}
  .spark i{flex:1;background:var(--accent-soft);border-radius:3px 3px 0 0;min-height:3px;display:block}
  .spark i.max{background:var(--accent)}
  .hist-empty{color:var(--muted);font-size:12.5px;text-align:center;padding:8px}
  .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 10px;text-align:center}
  .stat .v{font:700 20px var(--mono)}
  .stat .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}

  .scrim{position:fixed;inset:0;background:rgba(15,20,30,.55);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;z-index:20}
  .scrim.on{display:flex}
  .sheet{background:var(--surface);width:100%;max-width:560px;border-radius:22px 22px 0 0;padding:20px 20px 30px;animation:up .22s ease;max-height:88vh;overflow:auto}
  @keyframes up{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
  .sheet h3{font-family:var(--disp);font-size:17px;font-weight:600;text-align:center}
  .sheet .sub{text-align:center;color:var(--muted);font-size:12.5px;margin-top:2px}

  .preset-row{display:flex;gap:8px;margin:16px 0 6px}
  .preset{flex:1;text-align:center;border:1px solid var(--line);background:var(--surface-2);border-radius:12px;padding:11px 6px;cursor:pointer;font:600 13px var(--body)}
  .preset.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .preset small{display:block;font-weight:400;font-size:10px;color:var(--muted);margin-top:2px}
  .preset.on small{color:#c9cdd6}
  .chips-label{font:600 11px var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:var(--surface);border-radius:11px;padding:10px 13px;cursor:pointer;font:600 13px var(--body);color:var(--muted);display:flex;align-items:center;gap:7px;transition:.12s}
  .chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent)}
  .chip.fixed{opacity:.65;cursor:default}
  .chip .mark{width:16px;height:16px;border-radius:5px;border:1.5px solid currentColor;display:grid;place-items:center;font-size:11px;line-height:1}

  /* how-to sheet */
  .cues{list-style:none;margin:16px 0 6px;padding:0}
  .cues li{display:flex;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line);font-size:14px;align-items:flex-start}
  .cues li:last-child{border-bottom:0}
  .cues .num{flex:0 0 22px;height:22px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font:700 12px var(--mono);display:grid;place-items:center;margin-top:1px}
  .yt{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:16px;background:#ff0033;color:#fff;border:0;border-radius:12px;padding:14px;font:700 14px var(--body);text-decoration:none;cursor:pointer}
  .yt svg{width:22px;height:22px;fill:#fff}

  .clock{font:700 62px var(--mono);text-align:center;letter-spacing:-.02em;margin:16px 0 4px;font-variant-numeric:tabular-nums}
  .clock.run{color:var(--accent)}
  .best-hint{text-align:center;font:400 12px var(--mono);color:var(--muted);margin-bottom:14px}
  .best-hint b{color:var(--ok)}
  .timer-btns{display:flex;gap:10px}
  .timer-btns .btn{flex:1;padding:14px;font-size:15px;justify-content:center;text-align:center}
  .manual{display:flex;gap:8px;margin-top:12px;align-items:center;justify-content:center;color:var(--muted);font-size:13px}
  .manual input{width:74px;font:700 15px var(--mono);text-align:center;padding:9px;border:1px solid var(--line);border-radius:9px;background:var(--surface-2)}
  .toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%) translateY(20px);opacity:0;background:var(--ink);color:#fff;padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;transition:.25s;z-index:30;pointer-events:none;white-space:nowrap;max-width:90%}
  .toast.on{opacity:1;transform:translateX(-50%)}
  .reset{display:block;margin:8px auto 0;background:none;border:0;color:var(--muted);font-size:12px;text-decoration:underline;cursor:pointer}
  .close-x{width:100%;margin-top:14px;justify-content:center;text-align:center;color:var(--muted)}
</style>

<header>
  <div class="kicker">Sala de Skills</div>
  <h1>Handstand · L-sit · Front lever</h1>
  <div class="equip-bar">
    <button class="equip-btn" onclick="openEquip()"><span class="dot"></span><span class="lbl" id="equipLbl">Equipo</span><span class="chev">▾</span></button>
    <button class="quick-toggle" id="quickBtn" onclick="toggleQuick()">⚡ Rápida</button>
  </div>
</header>

<nav id="nav"></nav>
<main id="main"></main>

<!-- Equipment sheet -->
<div class="scrim" id="scrimE">
  <div class="sheet">
    <h3>¿Qué tienes hoy?</h3>
    <div class="sub">Elige un preset o marca tus implementos. La rutina se adapta sola.</div>
    <div class="preset-row" id="presetRow"></div>
    <div class="chips-label">Implementos</div>
    <div class="chips" id="chips"></div>
    <button class="btn t close-x" onclick="closeEquip()" style="color:#fff">Listo</button>
  </div>
</div>

<!-- How-to sheet -->
<div class="scrim" id="scrimH">
  <div class="sheet">
    <h3 id="hName">—</h3>
    <div class="sub">Puntos clave de técnica</div>
    <ul class="cues" id="hCues"></ul>
    <a class="yt" id="hYt" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2 31 31 0 0 0 0 12a31 31 0 0 0 .5 5.8 3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1A31 31 0 0 0 24 12a31 31 0 0 0-.5-5.8zM9.6 15.6V8.4l6.2 3.6z"/></svg>
      Ver tutorial en YouTube
    </a>
    <button class="btn close-x" onclick="closeHow()">Cerrar</button>
  </div>
</div>

<!-- Timer sheet -->
<div class="scrim" id="scrim">
  <div class="sheet">
    <h3 id="tName">—</h3>
    <div class="sub" id="tTarget"></div>
    <div class="clock" id="clock">00.0</div>
    <div class="best-hint" id="bestHint"></div>
    <div class="timer-btns">
      <button class="btn t" id="startBtn" style="flex:2">Iniciar</button>
      <button class="btn" id="saveBtn">Guardar</button>
    </div>
    <div class="manual">o a mano: <input id="manual" type="number" inputmode="decimal" placeholder="seg"> seg</div>
    <button class="btn close-x" id="closeBtn">Cerrar</button>
  </div>
</div>

<!-- Reps sheet -->
<div class="scrim" id="scrim2">
  <div class="sheet">
    <h3 id="rName">—</h3>
    <div class="sub" id="rTarget"></div>
    <div class="manual" style="margin-top:22px;font-size:15px">Reps logradas: <input id="reps" type="number" inputmode="numeric" placeholder="0" style="width:88px;font-size:18px"></div>
    <div class="timer-btns" style="margin-top:22px">
      <button class="btn p" id="repsSave" style="flex:1;justify-content:center">Guardar</button>
      <button class="btn" id="repsClose" style="flex:1;justify-content:center;color:var(--muted)">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ---------- Almacenamiento ----------
   Dentro de Claude usa window.storage; al desplegar en web (GitHub Pages,
   Vercel, etc.) no existe, así que caemos a localStorage del navegador. */
if(typeof window.storage==="undefined"){
  window.storage={
    get:async k=>{try{const v=localStorage.getItem(k);return v!=null?{key:k,value:v}:null;}catch(e){return null;}},
    set:async (k,v)=>{try{localStorage.setItem(k,v);return {key:k,value:v};}catch(e){return null;}},
    delete:async k=>{try{localStorage.removeItem(k);}catch(e){}return {key:k,deleted:true};},
    list:async ()=>{try{return {keys:Object.keys(localStorage)};}catch(e){return {keys:[]};}}
  };
}

/* ---------- Equipment ---------- */
const EQUIP={floor:{label:"Suelo",fixed:true},wall:{label:"Pared"},pullbar:{label:"Barra de dominadas"},dipbar:{label:"Barras paralelas"},lowbar:{label:"Barra baja / rail"},rings:{label:"Anillas"},weights:{label:"Pesas"}};
const PRESETS={parque:{label:"Parque",hint:"barras",set:["floor","pullbar","dipbar","lowbar"]},casa:{label:"Casa",hint:"pared + pesas",set:["floor","wall","weights"]},todo:{label:"Todo",hint:"gym completo",set:["floor","wall","pullbar","dipbar","lowbar","rings","weights"]}};

const SKILLS={
  handstand:{name:"Handstand (chest-to-wall)",goal:60,milestones:[0,15,30,45,60]},
  lsit:{name:"L-sit",goal:30,milestones:[0,8,15,22,30]},
  frontlever:{name:"Front lever (tuck)",goal:20,milestones:[0,5,10,15,20]}
};

/* hw = {c:[cues], y:"youtube search"} */
const DAYS=[
  {id:"d1",label:"Día 1",focus:"Handstand + Empuje",ex:[
    {id:"kick",name:"Kick-ups a pared",target:"5 × 3 intentos",type:"reps",equip:["wall"],
      hw:{c:["Manos a un palmo de la pared, dedos abiertos","Mira entre tus manos, no al frente","Patada controlada con una pierna, la otra la sigue","Brazos rectos y hombros empujando siempre"],y:"kick up to handstand wall tutorial"},
      alt:[{id:"kick_free",name:"Kick-ups libres (buscar equilibrio)",target:"5 × 3 intentos",hw:{c:["Sin pared: patada suave, no tan fuerte","Busca el punto de balance, aguanta 1-2 s","Sal de lado si te pasas, no en arco"],y:"handstand kick up freestanding beginner"},equip:["floor"]}]},
    {id:"ctw",name:"Chest-to-wall hold",target:"4 × 20–40 s",type:"hold",skill:"handstand",equip:["wall"],
      hw:{c:["Sube gateando con el pecho hacia la pared","Cadera sobre hombros, cuerpo en línea recta","Aprieta glúteos y abdomen, costillas metidas","Empuja el suelo (elevación de hombros)"],y:"chest to wall handstand hold tutorial"},
      alt:[{id:"ctw_free",name:"Handstand libre (holds cortos)",target:"4 × 15–30 s",hw:{c:["Mirada al suelo entre las manos","Corrige con las yemas de los dedos","Cuerpo apretado como una tabla"],y:"freestanding handstand hold beginner"},equip:["floor"]}]},
    {id:"wall",name:"Wall hold (alineación)",target:"3 × 30 s",type:"hold",equip:["wall"],
      hw:{c:["Espalda a la pared, talones apoyados","Camina las manos hacia la pared para alinear","Costillas metidas, sin arquear la espalda"],y:"back to wall handstand alignment"}},
    {id:"pike",name:"Pike push-ups",target:"4 × 6–10",type:"reps",equip:["floor"],
      hw:{c:["Cadera arriba en V invertida","Baja la corona de la cabeza hacia el suelo","Codos a unos 45°, no abiertos del todo"],y:"pike push up tutorial form"}},
    {id:"dip",name:"Fondos / dips",target:"4 × 8–12",type:"reps",equip:["dipbar"],
      hw:{c:["Hombros abajo, lejos de las orejas","Baja hasta ~90° de codo","Ligera inclinación al frente"],y:"parallel bar dips proper form"},
      alt:[{id:"dip_low",name:"Fondos en barra baja / banco",target:"4 × 8–12",hw:{c:["Manos al borde, dedos al frente","Codos hacia atrás, no afuera","Baja controlado hasta 90°"],y:"bench dips proper form"},equip:["lowbar"]},
           {id:"dip_dia",name:"Flexiones diamante",target:"4 × 10–15",hw:{c:["Manos en diamante bajo el pecho","Codos pegados al cuerpo","Cuerpo recto, core firme"],y:"diamond push up form"},equip:["floor"]}]},
    {id:"plean",name:"Pseudo planche lean",target:"3 × 15–20 s",type:"hold",equip:["floor"],
      hw:{c:["Manos a la altura de la cadera, dedos afuera/atrás","Inclínate al frente hasta sentir tensión en hombros","Escápulas protraídas (empuja el suelo lejos)"],y:"pseudo planche lean tutorial"}},
    {id:"press",name:"Press de hombro (pesas)",target:"3 × 12",type:"reps",equip:["weights"],
      hw:{c:["Core firme, no arquees la lumbar","Sube hasta bloquear codos arriba","Baja controlado a la altura de las orejas"],y:"dumbbell shoulder press form"},
      alt:[{id:"press_pike",name:"Pike push-ups elevadas",target:"3 × 8–12",hw:{c:["Pies sobre una superficie elevada","Cadera bien arriba para cargar hombros","Corona al suelo, codos a 45°"],y:"elevated pike push up"},equip:["floor"]}]}
  ]},
  {id:"d2",label:"Día 2",focus:"Tracción + Front lever + Core",ex:[
    {id:"hang",name:"Dead hang (colgado)",target:"3 × 20–30 s",type:"hold",equip:["pullbar"],
      hw:{c:["Agarre firme, pulgares alrededor","Hombros activos: encoge un poco y sostén","Respira, relaja el resto del cuerpo"],y:"active dead hang tutorial"}},
    {id:"tfl",name:"Tuck front lever hold",target:"5 × 10–15 s",type:"hold",skill:"frontlever",equip:["pullbar"],
      hw:{c:["Colgado, retrae y deprime las escápulas","Lleva rodillas al pecho y sube la cadera","Tira de la barra hacia tu cadera (brazos rectos)","Busca cuerpo horizontal, espalda paralela al suelo"],y:"tuck front lever tutorial progression"},
      alt:[{id:"tfl_ring",name:"Tuck front lever en anillas",target:"5 × 10–15 s",hw:{c:["Anillas firmes, gira los pulgares al frente","Mismo tuck: rodillas al pecho, cadera arriba","Controla la inestabilidad extra de las anillas"],y:"tuck front lever rings"},equip:["rings"]}]},
    {id:"row",name:"Remo invertido",target:"4 × 8–12",type:"reps",equip:["lowbar"],
      hw:{c:["Cuerpo recto como tabla, talones apoyados","Tira del pecho hacia la barra","Aprieta escápulas arriba, baja controlado"],y:"inverted row proper form"},
      alt:[{id:"row_bar",name:"Remo australiano (barra a la cadera)",target:"4 × 8–12",hw:{c:["Barra a la altura de la cadera","Cuerpo recto, pecho a la barra","Más horizontal = más difícil"],y:"australian pull up form"},equip:["pullbar"]},
           {id:"row_wt",name:"Remo con pesa",target:"4 × 8–12",hw:{c:["Bisagra de cadera, espalda recta","Lleva la pesa a la cadera, codo cerca","Aprieta la escápula al final"],y:"single arm dumbbell row form"},equip:["weights"]}]},
    {id:"pull",name:"Dominadas",target:"4 × máx",type:"reps",equip:["pullbar"],
      hw:{c:["Escápulas abajo antes de tirar","Pecho arriba, barbilla sobre la barra","Sin balanceo, baja hasta extender"],y:"pull up proper form beginner"}},
    {id:"hollow",name:"Hollow body hold",target:"4 × 20–40 s",type:"hold",equip:["floor"],
      hw:{c:["Lumbar pegada al suelo (sin hueco)","Brazos y piernas extendidos, hombros arriba","Aprieta el abdomen todo el tiempo"],y:"hollow body hold tutorial"}},
    {id:"arch",name:"Arch / superman hold",target:"3 × 20 s",type:"hold",equip:["floor"],
      hw:{c:["Boca abajo, brazos al frente","Eleva pecho y piernas a la vez","Aprieta glúteos, mira al suelo"],y:"superman hold exercise form"}}
  ]},
  {id:"d3",label:"Día 3",focus:"Movilidad · descanso activo",mobility:[
    {t:"5 min",d:"Muñecas",s:"Flexión/extensión, círculos, apoyo progresivo — base del handstand"},
    {t:"5 min",d:"Hombros",s:"Dislocates con banda/palo, flexión de hombro en pared"},
    {t:"5 min",d:"Compresión de cadera",s:"Pica sentado, buenos días con isquios — clave para L-sit"},
    {t:"5 min",d:"Columna",s:"Gato-camello, rotaciones torácicas"}
  ]},
  {id:"d4",label:"Día 4",focus:"L-sit + Piernas + Core",ex:[
    {id:"squat",name:"Sentadilla con peso",target:"4 × 8–12",type:"reps",equip:["weights"],
      hw:{c:["Pies al ancho de hombros","Rodillas siguen la punta de los pies","Baja controlado, pecho arriba"],y:"goblet squat form"},
      alt:[{id:"squat_bw",name:"Sentadilla búlgara / progresión pistol",target:"4 × 8–12 c/lado",hw:{c:["Pie trasero elevado en un banco","Baja recto sobre la pierna de adelante","Controla el equilibrio, torso erguido"],y:"bulgarian split squat form"},equip:["floor"]}]},
    {id:"rdl",name:"Peso muerto rumano",target:"3 × 10",type:"reps",equip:["weights"],
      hw:{c:["Bisagra de cadera, no sentadilla","Espalda recta, pesas cerca de las piernas","Siente el estiramiento en isquios"],y:"romanian deadlift dumbbell form"},
      alt:[{id:"rdl_bw",name:"Puente a una pierna / nordic asistido",target:"3 × 10 c/lado",hw:{c:["Puente: una pierna, sube la cadera y aprieta glúteo","Nordic: baja lento controlando con isquios","No arquees la lumbar"],y:"single leg glute bridge form"},equip:["floor"]}]},
    {id:"lunge",name:"Zancadas",target:"3 × 10 c/lado",type:"reps",equip:["floor"],
      hw:{c:["Paso largo, torso recto","Rodilla trasera baja hacia el suelo","Empuja con el talón de adelante"],y:"reverse lunge form"}},
    {id:"lsit",name:"Tuck L-sit hold",target:"5 × 10–20 s",type:"hold",skill:"lsit",equip:["floor"],
      hw:{c:["Manos al lado de la cadera, empuja el suelo","Deprime los hombros (súbete del suelo)","Eleva la cadera y encoge las rodillas al pecho"],y:"tuck l sit progression floor"},
      alt:[{id:"lsit_bar",name:"L-sit en barras paralelas",target:"5 × 10–20 s",hw:{c:["Brazos rectos y bloqueados en las barras","Hombros abajo, no encogidos","Rodillas al pecho, sube la cadera"],y:"l sit parallel bars tutorial"},equip:["dipbar"]}]},
    {id:"comp",name:"Compresión activa / leg raises",target:"3 × 10–15",type:"reps",equip:["floor"],
      hw:{c:["Lumbar pegada al suelo","Sube piernas rectas sin impulso","Baja controlado, no dejes caer"],y:"lying leg raises form"},
      alt:[{id:"comp_hang",name:"Elevaciones de piernas colgado",target:"3 × 8–12",hw:{c:["Colgado con hombros activos","Sube las rodillas o piernas sin balanceo","Controla la bajada"],y:"hanging leg raises form"},equip:["pullbar"]}]},
    {id:"hs4",name:"Handstand (práctica corta)",target:"5 min de holds",type:"hold",skill:"handstand",equip:["wall"],
      hw:{c:["Repasa alineación contra la pared","Series cortas y frescas, calidad > cantidad","Trabaja el empuje de hombros"],y:"handstand practice routine wall"},
      alt:[{id:"hs4_free",name:"Handstand libre (práctica corta)",target:"5 min de intentos",hw:{c:["Kick-ups suaves buscando balance","Corrige con los dedos","Sal de lado si te pasas"],y:"freestanding handstand practice"},equip:["floor"]}]}
  ]},
  {id:"d5",label:"Día 5",focus:"Skills integrados + Movilidad",ex:[
    {id:"balance",name:"Práctica de balance libre",target:"10 min",type:"hold",skill:"handstand",equip:["floor"],
      hw:{c:["Mira al suelo entre las manos","Micro-ajustes con las yemas de los dedos","Si caes al frente, presiona con las puntas"],y:"handstand balance finger tips tutorial"}},
    {id:"lsit5",name:"L-sit progresión",target:"4 × máx",type:"hold",skill:"lsit",equip:["floor"],
      hw:{c:["Avanza: tuck → una pierna → L-sit completo","Hombros abajo siempre","Compresión activa de la cadera"],y:"l sit progression steps"},
      alt:[{id:"lsit5_bar",name:"L-sit en barras (progresión)",target:"4 × máx",hw:{c:["Brazos bloqueados en las barras","Sube el nivel: tuck → single → full","Hombros deprimidos"],y:"l sit bars progression"},equip:["dipbar"]}]},
    {id:"flprep",name:"Front lever prep escapular",target:"4 × 8",type:"reps",equip:["pullbar"],
      hw:{c:["Colgado con brazos rectos","Deprime y retrae las escápulas (sube el cuerpo sin doblar codos)","Baja controlado, repite"],y:"scapular pull ups tutorial"},
      alt:[{id:"flprep_floor",name:"Arch + retracción escapular en suelo",target:"4 × 20 s",hw:{c:["Boca abajo, brazos en Y/T","Retrae escápulas y eleva el pecho","Aprieta glúteos"],y:"scapular retraction prone floor"},equip:["floor"]}]},
    {id:"core5",name:"Hollow + arch (superset)",target:"3 rondas",type:"hold",equip:["floor"],
      hw:{c:["Alterna hollow (boca arriba) y arch (boca abajo)","Mantén tensión, sin descanso entre los dos","20-30 s cada uno por ronda"],y:"hollow body arch superset"}}
  ]}
];

/* ---------- State ---------- */
let logs=[], equipSet=["floor","wall","weights"], quick=false, active="d1";
let timerEx=null, repsEx=null, shownEx={};
let t0=0, elapsed=0, running=false, raf=null;
const QUICK_N=5;

const $=s=>document.querySelector(s);
const fmt=s=>s.toFixed(1);

async function load(){
  try{const r=await window.storage.get("calis:logs");if(r&&r.value)logs=JSON.parse(r.value);}catch(e){logs=[];}
  try{const r=await window.storage.get("calis:equip");if(r&&r.value)equipSet=JSON.parse(r.value);}catch(e){}
  try{const r=await window.storage.get("calis:quick");if(r&&r.value)quick=JSON.parse(r.value);}catch(e){}
  if(!equipSet.includes("floor"))equipSet.push("floor");
  render();
}
async function persistLogs(){try{await window.storage.set("calis:logs",JSON.stringify(logs));}catch(e){toast("No se pudo guardar 😕");}}
async function persistEquip(){try{await window.storage.set("calis:equip",JSON.stringify(equipSet));}catch(e){}}
async function persistQuick(){try{await window.storage.set("calis:quick",JSON.stringify(quick));}catch(e){}}

const bestFor=id=>logs.filter(l=>l.exId===id).reduce((m,l)=>Math.max(m,l.value),0);
const lastFor=id=>{const a=logs.filter(l=>l.exId===id);return a.length?a[a.length-1]:null;};
const bestSkill=sk=>logs.filter(l=>l.skill===sk).reduce((m,l)=>Math.max(m,l.value),0);
const has=req=>req.every(r=>equipSet.includes(r));
const sameSet=(a,b)=>a.length===b.length&&a.every(x=>b.includes(x));

function resolve(e){
  if(has(e.equip))return {id:e.id,name:e.name,target:e.target,type:e.type,skill:e.skill||null,hw:e.hw,adapted:false};
  if(e.alt)for(const a of e.alt){if(has(a.equip))return {id:a.id,name:a.name,target:a.target,type:a.type||e.type,skill:e.skill||null,hw:a.hw||e.hw,adapted:true,orig:e.name};}
  return null;
}

function equipLabel(){
  for(const [k,p] of Object.entries(PRESETS))if(sameSet(p.set,equipSet))return "Equipo: "+p.label;
  const names=equipSet.filter(x=>x!=="floor").map(x=>EQUIP[x].label);
  return names.length?"Equipo: "+names.slice(0,2).join(", ")+(names.length>2?` +${names.length-2}`:""):"Equipo: solo suelo";
}

window.toggleQuick=()=>{quick=!quick;persistQuick();render();};

/* ---------- Render ---------- */
function render(){
  $("#equipLbl").textContent=equipLabel();
  $("#quickBtn").classList.toggle("on",quick);
  const nav=$("#nav");nav.innerHTML="";
  DAYS.forEach(d=>{const b=document.createElement("button");b.className="tab"+(active===d.id?" on":"");b.textContent=d.label;b.onclick=()=>{active=d.id;render();};nav.appendChild(b);});
  const p=document.createElement("button");p.className="tab"+(active==="prog"?" on":"");p.textContent="📈 Progreso";p.onclick=()=>{active="prog";render();};nav.appendChild(p);
  active==="prog"?renderProgress():renderDay(DAYS.find(d=>d.id===active));
}

function renderDay(d){
  const m=$("#main");shownEx={};let h="";
  h+=`<div class="day-head"><span class="n">${d.label.toUpperCase()}</span><span class="focus">${d.focus}</span></div>`;

  if(d.mobility){
    let mob=d.mobility;
    if(quick){h+=`<div class="quick-banner">⚡ Rutina rápida · lo esencial de movilidad</div>`;mob=mob.slice(0,3);}
    h+=`<div class="mob">`;
    mob.forEach(r=>h+=`<div class="mob-row"><div class="t">${r.t}</div><div class="d">${r.d}<small>${r.s}</small></div></div>`);
    h+=`</div>`;
    if(d.note)h=h;
    m.innerHTML=h;return;
  }

  let list=[],hidden=0;
  d.ex.forEach(e=>{const r=resolve(e);r?list.push(r):hidden++;});

  if(quick && list.length){
    const skills=list.filter(x=>x.skill), rest=list.filter(x=>!x.skill);
    list=[...skills,...rest].slice(0,QUICK_N);
    h+=`<div class="quick-banner">⚡ Rutina rápida · ${list.length} ejercicios (skills primero)</div>`;
  }

  if(list.length===0){
    h+=`<div class="empty-day"><b>Nada disponible con este equipo</b>Este día necesita implementos que no marcaste. Cambia tu equipo arriba o elige otro día.</div>`;
    m.innerHTML=h;return;
  }

  list.forEach(r=>{
    shownEx[r.id]=r;
    const best=bestFor(r.id),last=lastFor(r.id);
    const badge=r.skill?`<span class="badge skill">Skill</span>`:r.type==="hold"?`<span class="badge hold">Hold</span>`:`<span class="badge">Reps</span>`;
    const swap=r.adapted?`<div class="swap">↳ Adaptado a tu equipo <s>${r.orig}</s></div>`:"";
    const lastTxt=last?`<div class="last"><span>último</span>${last.value}${r.type==="hold"?"s":" reps"}</div>`:`<div class="last empty"><span>último</span>—</div>`;
    const action=r.type==="hold"?`<button class="btn t" onclick="openTimer('${r.id}')">⏱ Cronometrar</button>`:`<button class="btn p" onclick="openReps('${r.id}')">＋ Registrar</button>`;
    const info=r.hw?`<button class="btn howto" onclick="openHow('${r.id}')">ⓘ Cómo</button>`:"";
    h+=`<div class="ex${r.adapted?' adapted':''}"><div class="ex-top"><div>
        <div class="ex-name">${r.name}</div>
        <div class="ex-target">${r.target}${best?` · récord ${best}${r.type==="hold"?"s":" reps"}`:""}</div>${swap}
      </div>${badge}</div>
      <div class="ex-actions">${action}${info}${lastTxt}</div></div>`;
  });

  if(!quick && hidden>0)h+=`<div class="hidden-note">${hidden} ejercicio${hidden>1?'s':''} oculto${hidden>1?'s':''} por tu equipo actual</div>`;
  m.innerHTML=h;
}

function renderProgress(){
  const m=$("#main");let h="";
  h+=`<div class="day-head"><span class="n">PROGRESO</span><span class="focus">Tus récords</span></div>`;
  const sess=new Set(logs.map(l=>new Date(l.ts).toISOString().slice(0,10))).size;
  h+=`<div class="summary">
    <div class="stat"><div class="v">${sess}</div><div class="l">Días activos</div></div>
    <div class="stat"><div class="v">${logs.length}</div><div class="l">Registros</div></div>
    <div class="stat"><div class="v mono">${bestSkill('handstand')||0}s</div><div class="l">Mejor HS</div></div>
  </div>`;
  Object.entries(SKILLS).forEach(([k,s])=>{
    const best=bestSkill(k),pct=Math.min(100,Math.round(best/s.goal*100)),gold=best>=s.goal;
    const hits=logs.filter(l=>l.skill===k).slice(-14),max=Math.max(...hits.map(x=>x.value),1);
    const spark=hits.length?`<div class="spark">${hits.map(x=>`<i class="${x.value===max?'max':''}" style="height:${Math.max(8,x.value/max*100)}%"></i>`).join("")}</div>`:`<div class="hist-empty">Aún sin registros — cronométrate en la pestaña del día</div>`;
    h+=`<div class="prog-card"><h3>${s.name}<span class="pr">${best}<small>/${s.goal}s</small></span></h3>
      <div class="track"><div class="fill ${gold?'gold':''}" style="width:${pct}%"></div></div>
      <div class="milestones">${s.milestones.map(x=>`<span>${x}s</span>`).join("")}</div>${spark}</div>`;
  });
  h+=`<button class="reset" onclick="wipe()">Borrar todos los registros</button>`;
  m.innerHTML=h;
}

/* ---------- Equipment sheet ---------- */
window.openEquip=()=>{renderEquip();$("#scrimE").classList.add("on");};
window.closeEquip=()=>{$("#scrimE").classList.remove("on");};
function renderEquip(){
  const pr=$("#presetRow");pr.innerHTML="";
  Object.entries(PRESETS).forEach(([k,p])=>{
    const on=sameSet(p.set,equipSet);const b=document.createElement("button");b.className="preset"+(on?" on":"");
    b.innerHTML=`${p.label}<small>${p.hint}</small>`;
    b.onclick=()=>{equipSet=[...p.set];persistEquip();renderEquip();render();};pr.appendChild(b);
  });
  const c=$("#chips");c.innerHTML="";
  Object.entries(EQUIP).forEach(([k,e])=>{
    const on=equipSet.includes(k);const b=document.createElement("button");
    b.className="chip"+(on?" on":"")+(e.fixed?" fixed":"");
    b.innerHTML=`<span class="mark">${on?'✓':''}</span>${e.label}${e.fixed?' (siempre)':''}`;
    if(!e.fixed)b.onclick=()=>{if(on)equipSet=equipSet.filter(x=>x!==k);else equipSet.push(k);persistEquip();renderEquip();render();};
    c.appendChild(b);
  });
}

/* ---------- How-to sheet ---------- */
function getEx(id){return shownEx[id]||null;}
window.openHow=id=>{
  const e=getEx(id);if(!e||!e.hw)return;
  $("#hName").textContent=e.name;
  $("#hCues").innerHTML=e.hw.c.map((t,i)=>`<li><span class="num">${i+1}</span><span>${t}</span></li>`).join("");
  $("#hYt").href="https://www.youtube.com/results?search_query="+encodeURIComponent(e.hw.y);
  $("#scrimH").classList.add("on");
};
window.closeHow=()=>$("#scrimH").classList.remove("on");

/* ---------- Timer ---------- */
window.openTimer=id=>{
  timerEx=getEx(id);if(!timerEx)return;
  elapsed=0;running=false;cancelAnimationFrame(raf);
  $("#tName").textContent=timerEx.name;$("#tTarget").textContent="Meta: "+timerEx.target;
  $("#clock").textContent="00.0";$("#clock").classList.remove("run");
  $("#startBtn").textContent="Iniciar";$("#manual").value="";
  const b=bestFor(id);$("#bestHint").innerHTML=b?`Tu récord: <b>${b}s</b> — ¡a superarlo!`:"Primer registro de este ejercicio";
  $("#scrim").classList.add("on");
};
$("#startBtn").onclick=()=>{
  if(!running){running=true;t0=performance.now()-elapsed*1000;$("#startBtn").textContent="Detener";$("#clock").classList.add("run");tick();}
  else{running=false;cancelAnimationFrame(raf);$("#startBtn").textContent="Reanudar";$("#clock").classList.remove("run");}
};
function tick(){elapsed=(performance.now()-t0)/1000;$("#clock").textContent=fmt(elapsed);if(running)raf=requestAnimationFrame(tick);}
$("#saveBtn").onclick=()=>{
  const man=parseFloat($("#manual").value);const val=!isNaN(man)&&man>0?man:Math.round(elapsed*10)/10;
  if(!val){toast("Cronometra o escribe los segundos");return;}
  saveLog(timerEx,Math.round(val*10)/10);$("#scrim").classList.remove("on");cancelAnimationFrame(raf);running=false;
};
$("#closeBtn").onclick=()=>{$("#scrim").classList.remove("on");cancelAnimationFrame(raf);running=false;};

/* ---------- Reps ---------- */
window.openReps=id=>{
  repsEx=getEx(id);if(!repsEx)return;
  $("#rName").textContent=repsEx.name;$("#rTarget").textContent="Meta: "+repsEx.target;
  $("#reps").value="";$("#scrim2").classList.add("on");setTimeout(()=>$("#reps").focus(),100);
};
$("#repsSave").onclick=()=>{const v=parseInt($("#reps").value);if(!v||v<0){toast("Escribe las reps");return;}saveLog(repsEx,v);$("#scrim2").classList.remove("on");};
$("#repsClose").onclick=()=>$("#scrim2").classList.remove("on");

/* ---------- Save / wipe ---------- */
async function saveLog(ex,value){
  const prevBest=bestFor(ex.id);
  logs.push({ts:Date.now(),exId:ex.id,skill:ex.skill||null,type:ex.type,value});
  await persistLogs();
  const unit=ex.type==="hold"?"s":" reps";
  toast(ex.type==="hold"&&value>prevBest&&prevBest>0?`🔥 ¡Nuevo récord! ${value}${unit}`:`Guardado: ${value}${unit}`);
  render();
}
window.wipe=async()=>{if(!confirm("¿Borrar todos tus registros? No se puede deshacer."))return;logs=[];await persistLogs();toast("Registros borrados");render();};

let toastT;
function toast(msg){const t=$("#toast");t.textContent=msg;t.classList.add("on");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("on"),1900);}

load();
</script>
